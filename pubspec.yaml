name: lumina
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.7
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4
  camera: ^0.12.0+1
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  google_mlkit_text_recognition: ^0.15.1
  image: ^4.8.0
  extended_image: ^10.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
  - assets/images/
  - assets/icons/


flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#673AB7"