name: lumina
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.10.7
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
  - assets/images/
  - assets/icons/


flutter_launcher_icons:
  android: "launcher_icon" 
  ios: true
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#673AB7"